<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body class="auth-page">
  <header class="minimal-header">
    <a href="/" class="brand">Soldesk Market</a>
  </header>

  <main class="auth-shell">
    <section class="auth-visual">
      <p class="hero-badge">WELCOME BACK</p>
      <h1>아이디와 비밀번호로<br>간편하게 로그인하세요.</h1>
      <p>로그인 후에는 상단에서 회원가입, 로그인 버튼이 사라지고 사용자 정보와 로그아웃만 표시됩니다.</p>
    </section>

    <section class="auth-card">
      <h2>로그인</h2>
      <p class="auth-desc">가입한 아이디와 비밀번호를 입력해주세요.</p>
      <form id="loginForm">
        <div class="field">
          <label for="loginId">아이디</label>
          <input id="loginId" name="loginId" type="text" placeholder="아이디를 입력하세요" required>
        </div>
        <div class="field">
          <label for="password">비밀번호</label>
          <input id="password" name="password" type="password" placeholder="비밀번호를 입력하세요" required>
        </div>
        <button class="btn btn-primary btn-block" type="submit">로그인</button>
        <div id="loginMessage" style="display:none;"></div>
      </form>
      <div class="auth-links">
        <span>처음이신가요?</span>
        <a href="/signup.html">회원가입</a>
      </div>
    </section>
  </main>

  <script src="/assets/app.js"></script>
  <script>
    renderHeader();

    document.getElementById('loginForm').addEventListener('submit', async function (event) {
      event.preventDefault();
      const payload = {
        loginId: document.getElementById('loginId').value,
        password: document.getElementById('password').value
      };

      try {
        const result = await apiRequest('/member-service/member/doLogin', {
          method: 'POST',
          body: JSON.stringify(payload)
        });
        saveAuth(result);
        showMessage('loginMessage', '로그인에 성공했습니다. 메인페이지로 이동합니다.', 'success');
        setTimeout(function () {
          window.location.href = '/';
        }, 500);
      } catch (error) {
        showMessage('loginMessage', error.message || '로그인에 실패했습니다. 아이디와 비밀번호를 확인해주세요.', 'error');
      }
    });
  </script>
</body>
</html>
