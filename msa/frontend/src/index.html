<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soldesk Market</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <header class="shop-header">
    <div class="topbar">
      <div class="container topbar-inner">
        <a href="/" class="brand brand-large">Soldesk Market</a>
        <form class="search-box" onsubmit="return false;">
          <input type="text" placeholder="갤럭시, 노트북, 이어폰 등 원하는 상품을 검색해보세요">
        </form>
        <nav class="header-actions">
          <a class="header-link auth-guest" href="/login.html">로그인</a>
          <a class="header-link auth-guest" href="/signup.html">회원가입</a>
          <a class="header-link auth-user" href="/product-create.html">상품등록</a>
          <div id="userBox" class="user-box"></div>
        </nav>
      </div>
    </div>
    <div class="categorybar">
      <div class="container categorybar-inner">
        <span class="category-chip active">추천상품</span>
        <span class="category-chip">디지털</span>
        <span class="category-chip">가전</span>
        <span class="category-chip">패션</span>
        <span class="category-chip">취미/반려</span>
        <span class="category-chip">리빙</span>
      </div>
    </div>
  </header>

  <main>
    <section class="hero-banner">
      <div class="container hero-layout">
        <div class="hero-copy">
          <p class="hero-badge">오늘의 특가</p>
          <h1>실제 쇼핑몰처럼 둘러보고<br>바로 구매할 수 있는 상품 페이지</h1>
          <p class="hero-text">회원가입과 로그인 후 상품을 등록하고, 상세 페이지에서 바로 구매해 재고가 차감되는 흐름까지 한 번에 확인할 수 있습니다.</p>
          <div class="hero-actions">
            <a class="btn btn-primary" href="/product-create.html">상품 등록하기</a>
            <a class="btn btn-light" href="#productSection">상품 둘러보기</a>
          </div>
        </div>
        <div class="hero-panel">
          <div class="hero-card">
            <span class="hero-card-label">빠른 배송</span>
            <strong>지금 등록한 상품이 메인에 바로 노출됩니다.</strong>
            <p>상세 페이지 이동, 구매, 재고 차감까지 쇼핑몰 흐름을 자연스럽게 연결했습니다.</p>
          </div>
        </div>
      </div>
    </section>

    <section class="container section-spacing" id="productSection">
      <div class="section-head">
        <div>
          <p class="section-subtitle">추천 상품</p>
          <h2 class="section-title">지금 등록된 상품</h2>
        </div>
      </div>
      <div id="productList" class="product-grid"></div>
    </section>
  </main>

  <script src="/assets/app.js"></script>
  <script>
    renderHeader();
    loadProducts();
  </script>
</body>
</html>
