<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입</title>
  <link rel="stylesheet" href="/assets/style.css?v=20260322b">
</head>
<body class="auth-page">
  <header class="minimal-header">
    <a href="/" class="brand">Soldesk Market</a>
  </header>

  <main class="auth-shell">
    <section class="auth-visual">
      <p class="hero-badge">NEW MEMBER</p>
      <h1>실제 쇼핑몰처럼<br>회원가입 후 바로 이용하세요.</h1>
      <p>이름, 아이디, 비밀번호, 닉네임, 이메일을 입력하면 회원가입이 완료되고 로그인 화면으로 이동합니다.</p>
    </section>

    <section class="auth-card">
      <h2>회원가입</h2>
      <p class="auth-desc">필수 정보를 입력하고 계정을 생성해주세요.</p>
      <form id="signupForm">
        <div class="field">
          <label for="name">이름</label>
          <input id="name" name="name" type="text" placeholder="이름을 입력하세요" required>
        </div>
        <div class="field">
          <label for="loginId">아이디</label>
          <input id="loginId" name="loginId" type="text" placeholder="로그인에 사용할 아이디" required>
        </div>
        <div class="field">
          <label for="nickname">닉네임</label>
          <input id="nickname" name="nickname" type="text" placeholder="화면에 표시될 닉네임" required>
        </div>
        <div class="field">
          <label for="email">이메일</label>
          <input id="email" name="email" type="email" placeholder="example@email.com" required>
        </div>
        <div class="field">
          <label for="password">비밀번호</label>
          <input id="password" name="password" type="password" placeholder="비밀번호를 입력하세요" required>
        </div>
        <button class="btn btn-primary btn-block" type="submit">회원가입</button>
        <div id="signupMessage" style="display:none;"></div>
      </form>
      <div class="auth-links">
        <span>이미 가입하셨나요?</span>
        <a href="/login.html">로그인</a>
      </div>
    </section>
  </main>

  <script src="/assets/app.js?v=20260322b"></script>
  <script>
    renderHeader();

    document.getElementById('signupForm').addEventListener('submit', async function (event) {
      event.preventDefault();
      const payload = {
        name: document.getElementById('name').value,
        loginId: document.getElementById('loginId').value,
        nickname: document.getElementById('nickname').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      };

      try {
        await apiRequest('/member-service/member/create', {
          method: 'POST',
          body: JSON.stringify(payload)
        });
        showMessage('signupMessage', '회원가입이 완료되었습니다. 로그인 페이지로 이동합니다.', 'success');
        setTimeout(function () {
          window.location.href = '/login.html';
        }, 500);
      } catch (error) {
        showMessage('signupMessage', error.message || '회원가입에 실패했습니다.', 'error');
      }
    });
  </script>
</body>
</html>
