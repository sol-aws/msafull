apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-depl
  namespace: soldesk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend-container
        image: 683668078297.dkr.ecr.ap-northeast-2.amazonaws.com/frontend-service:latest
        ports:
        - containerPort: 80 
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: soldesk
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: frontend
