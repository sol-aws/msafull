<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>상품상세</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="container">
  <a class="btn secondary" href="/">메인으로</a>
  <div id="detail" class="detail" style="margin-top:20px;"></div>
</div>
<script src="/js/app.js"></script>
<script>
  const id = new URLSearchParams(location.search).get('id');

  async function loadDetail() {
    const p = await api(`/product/${id}`);
    document.getElementById('detail').innerHTML = `
      <div><img src="${p.imageUrl}" alt="${p.name}"></div>
      <div>
        <div class="meta">${p.category || ''}</div>
        <h1>${p.name}</h1>
        <div class="price">${Number(p.price).toLocaleString()}원</div>
        <div class="meta">현재 재고 ${p.stockQuantity}개</div>
        <p>${p.description || ''}</p>
        <form id="orderForm">
          <label>구매 수량</label>
          <input name="productCount" type="number" min="1" value="1" required>
          <button type="submit">구매</button>
        </form>
        <div class="notice">구매 버튼을 누르면 주문이 생성되고 재고가 1개 이상 입력 수량만큼 감소합니다.</div>
      </div>`;

    document.getElementById('orderForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const count = Number(new FormData(e.target).get('productCount'));
      try {
        await api('/ordering/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ productId: Number(id), productCount: count })
        }, true);
        alert('구매 완료');
        location.reload();
      } catch (err) {
        alert(err.message);
      }
    });
  }
  loadDetail().catch(err => alert(err.message));
</script>
</body>
</html>
