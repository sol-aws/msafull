eureka:
  client:
    enabled: false

server:
  port: 8080

spring:
  config:
    activate:
      on-profile: prod

  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - 'https://server.aws-esk.com'
            allowedMethods: '*'
            allowedHeaders: '*'
            allowedCredentials: true

      routes:
        - id: member-service
          predicates:
            - Path=/member-service/**
          filters:
            - StripPrefix=1
          uri: http://member-service:8080

        - id: ordering-service
          predicates:
            - Path=/ordering-service/**
          filters:
            - StripPrefix=1
          uri: http://ordering-service:8080

        - id: product-service
          predicates:
            - Path=/product-service/**
          filters:
            - StripPrefix=1
          uri: http://product-service:8080

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  codec:
    max-in-memory-size: 20MB

management:
  endpoints:
    web:
      exposure:
        include: "*"

