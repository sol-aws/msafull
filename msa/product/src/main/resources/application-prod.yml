server:
  port: 8080

spring:
  config:
    activate:
      on-profile: prod

  application:
    name: product-service

  datasource:
    url: jdbc:mysql://${DB_HOST}:3306/ordermsa?useSSL=false&allowPublicKeyRetrieval=true
    username: admin
    password: ${DB_PW}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

aws:
  access-key: ${AWS_ACCESS_KEY}
  secret-key: ${AWS_SECRET_KEY}
  region: ${AWS_REGION}
  s3:
    bucket: ${S3_BUCKET}

management:
  endpoints:
    web:
      exposure:
        include: "*"